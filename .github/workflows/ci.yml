name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Backend : pytest + couverture
  # ─────────────────────────────────────────────
  backend-tests:
    name: "Backend — Tests & Couverture"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: test-secret-key-for-ci
      ALGORITHM: HS256

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Lancer les tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml \
            --junit-xml=test-results.xml

      - name: Résumé des tests → GitHub
        if: always()
        working-directory: backend
        run: |
          echo "## Résultats Backend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          suite = tree.getroot()
          tests  = suite.get('tests', '?')
          passed = int(suite.get('tests', 0)) - int(suite.get('failures', 0)) - int(suite.get('errors', 0))
          fails  = suite.get('failures', '0')
          time   = round(float(suite.get('time', 0)), 2)
          print(f'| Tests | Réussis | Échecs | Durée |')
          print(f'|-------|---------|--------|-------|')
          print(f'| {tests} | {passed} | {fails} | {time}s |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Publier les résultats (artefact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/test-results.xml
            backend/coverage.xml

  # ─────────────────────────────────────────────
  # JOB 2 — Frontend : TS + ESLint + Jest + Build
  # ─────────────────────────────────────────────
  frontend-tests:
    name: "Frontend — TypeScript, ESLint & Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: TypeScript — vérification des types
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint — analyse statique
        working-directory: frontend
        run: npx eslint app components hooks lib --ext .ts,.tsx --max-warnings 0

      - name: Jest — tests unitaires
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests --coverage --coverageReporters=text-summary

      - name: Build de production
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Résumé → GitHub
        if: always()
        run: |
          echo "## Résultats Frontend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Jest | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Next.js | ✅ |" >> $GITHUB_STEP_SUMMARY
