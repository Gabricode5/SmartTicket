databases:
  - name: pfe-ece-postgres
    plan: free
    databaseName: ticketdb
    user: admin

services:
  - type: web
    name: pfe-ece-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pfe-ece-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: pfe-ece-frontend
          property: host
      - key: MISTRAL_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: mistral-embed

  - type: web
    name: pfe-ece-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: pfe-ece-backend
          property: host
